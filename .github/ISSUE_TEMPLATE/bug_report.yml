name: 🐞 Bug report
description: Report a problem with Open Docs
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps, or ideally a minimal reproduction repository or StackBlitz link.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `node -v`, package manager + version, OS, and browser.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this has not been reported.
          required: true
